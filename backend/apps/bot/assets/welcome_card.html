<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Что даёт программа</title>
  <style>
    body {
      margin: 0;
      background: #eef2f5;
      font-family: Arial, Helvetica, sans-serif;
    }
    .card {
      width: 720px;
      min-height: 920px;
      margin: 0;
      padding: 26px 24px 28px;
      box-sizing: border-box;
      background: #f4f6f8;
      color: #2b2b2b;
    }
    h1 {
      margin: 0 0 28px;
      text-align: center;
      font-size: 48px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      background: #4d7d91;
      padding: 26px 20px;
    }
    .item {
      display: grid;
      grid-template-columns: 94px 1fr;
      gap: 18px;
      align-items: center;
      background: #fff;
      color: #2b2b2b;
      border: 2px solid #d6dce0;
      padding: 18px 22px;
      margin-bottom: 18px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      color: #fff;
      background: #4d7d91;
    }
    .text {
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
    }
    .text span {
      font-weight: 500;
    }
    .footer {
      margin-top: 26px;
      background: #4d7d91;
      color: #fff;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      padding: 24px 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Что даёт программа</h1>

    <div class="item">
      <div class="icon">1</div>
      <div class="text">Персональная ссылка<br><span>для рекомендации</span></div>
    </div>

    <div class="item">
      <div class="icon">2</div>
      <div class="text">Бонусы<br><span>за заказы и рекомендации</span></div>
    </div>

    <div class="item">
      <div class="icon">3</div>
      <div class="text">Подарки<br><span>за бонусы</span></div>
    </div>

    <div class="item">
      <div class="icon">4</div>
      <div class="text">Заявки<br><span>вашей компании</span></div>
    </div>

    <div class="item">
      <div class="icon">5</div>
      <div class="text">Поддержка<br><span>администратора</span></div>
    </div>

    <div class="footer">Рекомендуйте, накапливайте бонусы и получайте подарки</div>
  </div>
</body>
</html>
